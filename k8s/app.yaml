apiVersion: apps/v1
kind: Deployment
metadata:
  name: zoghbi-cv-app
  namespace: zoghbi-cv
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zoghbi-cv-app
  template:
    metadata:
      labels:
        app: zoghbi-cv-app
    spec:
      containers:
        - name: zoghbi-cv-app
          image: elzoghbidocker/zoghbi-cv:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: zoghbi-cv-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zoghbi-cv-service
  namespace: zoghbi-cv
spec:
  selector:
    app: zoghbi-cv-app
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30080
  type: NodePort